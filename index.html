// -----------------------------
// PARSE FILE PATH
// -----------------------------
function parsePath(filePath) {
  const parts = filePath.split("/");

  return {
    category: parts[0],
    dataset: parts[1],
    trajectory: parts.length > 3 ? parts[2] : "all",
    fullFolder: parts[0] + "/" + parts[1],
    episode: getEpisodeNumber(filePath),
    maxProgress: getMaxProgress(filePath)
  };
}

// -----------------------------
// EXTRACT EPISODE / VIDEO NUMBER
// -----------------------------
function getEpisodeNumber(filePath) {
  const match = filePath.match(/episode_(\d+)/);
  return match ? Number(match[1]) : null;
}

// -----------------------------
// EXTRACT MAX PROGRESS / REWARD
// -----------------------------
function getMaxProgress(filePath) {
  const match = filePath.match(/max_reward_(\d+)/);
  return match ? Number(match[1]) : null;
}

// -----------------------------
// GET FILES FOR CURRENT TASK + TRAJECTORY
// -----------------------------
function getBaseFilteredFiles() {
  const selectedTask = taskDropdown.value;
  const selectedTraj = trajDropdown.value.toLowerCase();
  const mappedFolder = taskToFolderMap[selectedTask];

  if (!mappedFolder) return [];

  return videoFiles.filter(file => {
    const parsed = parsePath(file);

    return (
      parsed.fullFolder === mappedFolder &&
      parsed.trajectory === selectedTraj
    );
  });
}

// -----------------------------
// NUMERIC SORT HELPER
// -----------------------------
function sortNumbersAscending(values) {
  return values.sort((a, b) => a - b);
}

// -----------------------------
// OTHER HELPERS
// -----------------------------
function isSafariBrowser() {
  return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
}

function getMaxSupportedPlaybackSpeed() {
  return isSafariBrowser() ? 2 : 4;
}

function getSelectedPlaybackSpeed() {
  const requestedSpeed = Number(speedDropdown.value) || 1;
  const maxSpeed = getMaxSupportedPlaybackSpeed();

  return Math.min(requestedSpeed, maxSpeed);
}

// -----------------------------
// POPULATE MAX PROGRESS DROPDOWN
// -----------------------------
function populateMaxProgressDropdown(files) {
  const currentValue = maxProgressDropdown.value;

  const maxProgressValues = sortNumbersAscending(
    [...new Set(
      files
        .map(file => parsePath(file).maxProgress)
        .filter(value => value !== null)
    )]
  );

  maxProgressDropdown.innerHTML = "";

  maxProgressValues.forEach(value => {
    const option = document.createElement("option");
    option.value = String(value);
    option.textContent = value+"%";
    maxProgressDropdown.appendChild(option);
  });

  if (maxProgressValues.includes(Number(currentValue))) {
    maxProgressDropdown.value = currentValue;
  }
}

// -----------------------------
// POPULATE VIDEO NUMBER DROPDOWN
// -----------------------------
function populateVideoNumberDropdown(files) {
  const currentValue = videoNumberDropdown.value;

  const videoNumbers = sortNumbersAscending(
    [...new Set(
      files
        .map(file => parsePath(file).episode)
        .filter(value => value !== null)
    )]
  );

  videoNumberDropdown.innerHTML = "";

  videoNumbers.forEach(value => {
    const option = document.createElement("option");
    option.value = String(value);
    option.textContent = value;
    videoNumberDropdown.appendChild(option);
  });

  if (videoNumbers.includes(Number(currentValue))) {
    videoNumberDropdown.value = currentValue;
  }
}

// -----------------------------
// SHOW CORRECT SECONDARY DROPDOWN
// -----------------------------
function updateSecondaryControls(files) {
  const selectedTraj = trajDropdown.value;
  const selectedTask = taskDropdown.value;


if (selectedTraj === "Successful" || 
  selectedTask === "Open the drawer." || 
  selectedTask === "Insert the pipe into the opening." ||
  selectedTask === "Push the can near the blue cube." ||
  selectedTask === "Touch the strawberry." ||
  selectedTask === "Close the drawer." ||
  selectedTask === "Pick the can from the table." ||
  selectedTask === "Close the top drawer." ||
  selectedTask === "Open the microwave door." ||
  selectedTask === "Close the microwave door." ||
  selectedTask === "Rotate the knob to turn the stove on." ||
  selectedTask === "jackvial_so101_pickplace_recap_merged_v2"
) {
    maxProgressControl.style.display = "none";
    videoNumberControl.style.display = "inline";
    populateVideoNumberDropdown(files);
  } else if (selectedTraj === "Unsuccessful") {
    maxProgressControl.style.display = "inline";
    videoNumberControl.style.display = "none";
    populateMaxProgressDropdown(files);
  } 
}

function getSelectedPlaybackSpeed() {
  return Number(speedDropdown.value) || 1;
}

function applyPlaybackSpeedToAllVideos() {
  const speed = getSelectedPlaybackSpeed();

  document.querySelectorAll("video").forEach(video => {
    video.playbackRate = speed;
    video.defaultPlaybackRate = speed;
  });
}

// -----------------------------
// FILTER + RENDER
// -----------------------------
function renderVideos() {
  const selectedTraj = trajDropdown.value;
  const selectedTask = taskDropdown.value;
  let filteredFiles = getBaseFilteredFiles();

  updateSecondaryControls(filteredFiles);


  if (selectedTraj === "Successful"|| 
  selectedTask === "Open the drawer." || 
  selectedTask === "Insert the pipe into the opening." ||
  selectedTask === "Push the can near the blue cube." ||
  selectedTask === "Touch the strawberry." ||
  selectedTask === "Close the drawer." ||
  selectedTask === "Pick the can from the table." ||
  selectedTask === "Close the top drawer." ||
  selectedTask === "Open the microwave door." ||
  selectedTask === "Close the microwave door." ||
  selectedTask === "Rotate the knob to turn the stove on." ||
  selectedTask === "jackvial_so101_pickplace_recap_merged_v2" ) {
    const selectedVideoNumber = Number(videoNumberDropdown.value);

    filteredFiles = filteredFiles.filter(file => {
      return parsePath(file).episode === selectedVideoNumber;
    });
  } else if (selectedTraj === "Unsuccessful") {
    const selectedMaxProgress = Number(maxProgressDropdown.value);

    filteredFiles = filteredFiles.filter(file => {
      return parsePath(file).maxProgress === selectedMaxProgress;
    });
  }

  container.innerHTML = "";

  filteredFiles.forEach(file => {
    const block = document.createElement("div");
    block.className = "video-block";

    const video = document.createElement("video");
    video.setAttribute("controls", "");
    video.disablePictureInPicture = true;
    video.playbackRate = getSelectedPlaybackSpeed();
    video.defaultPlaybackRate = getSelectedPlaybackSpeed();
    video.setAttribute("controls", "");
    video.disablePictureInPicture = true;

    const source = document.createElement("source");
    // source.src = "model_outputs/combined/" + file;
    const VIDEO_BASE_URL = "https://storage.googleapis.com/roboreason-view-videos-philip/model_outputs/combined/";
    source.src = VIDEO_BASE_URL + file;

    source.type = "video/mp4";

    video.appendChild(source);
    block.appendChild(video);
    container.appendChild(block);
  });

  if (filteredFiles.length === 0) {
    container.innerHTML = "<p>No videos found for this selection.</p>";
  }
}

// -----------------------------
// EVENT LISTENERS
// -----------------------------
taskDropdown.addEventListener("change", renderVideos);
trajDropdown.addEventListener("change", renderVideos);
maxProgressDropdown.addEventListener("change", renderVideos);
videoNumberDropdown.addEventListener("change", renderVideos);

speedDropdown.addEventListener("change", () => {
  localStorage.setItem("globalPlaybackSpeed", speedDropdown.value);

  const speed = getSelectedPlaybackSpeed();

  document.querySelectorAll("video").forEach(video => {
    const wasPlaying = !video.paused && !video.ended;

    video.pause();
    video.playbackRate = speed;
    video.defaultPlaybackRate = speed;
    video.currentTime = 0;

    if (wasPlaying) {
      video.play().catch(error => {
        console.warn("Video playback could not be restarted:", error);
      });
    }
  });
});
// Initial render
renderVideos();

</script>
